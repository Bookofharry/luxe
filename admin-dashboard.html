<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - LUXE</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0b0b0b; font-family:Poppins,sans-serif; color:white; padding:40px; }
h1 { font-family:'Cormorant Garamond',serif; color:#d4af37; margin-bottom:30px; }
.dashboard-grid { display:grid; grid-template-columns:250px 1fr; gap:30px; }
.sidebar { background:#151515; padding:20px; border-radius:10px; }
.sidebar button { display:block; width:100%; padding:15px; background:transparent; border:none; color:white; text-align:left; cursor:pointer; font-size:16px; border-bottom:1px solid #333; }
.sidebar button:hover { color:#d4af37; }
.main-content { background:#151515; padding:30px; border-radius:10px; }
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:30px; }
.stat-card { background:#222; padding:20px; border-radius:8px; border-left:4px solid #d4af37; }
.stat-card h3 { color:#ccc; font-size:14px; margin-bottom:10px; }
.stat-card p { font-size:24px; font-weight:bold; color:#fff; }
table { width:100%; border-collapse:collapse; margin-top:20px; }
th, td { padding:12px; text-align:left; border-bottom:1px solid #333; }
th { color:#d4af37; }
.btn { background:#d4af37; color:black; border:none; padding:8px 15px; cursor:pointer; font-weight:bold; border-radius:4px; }
.btn-danger { background:#ff4b4b; color:white; }
input, select, textarea { width:100%; padding:10px; margin-bottom:15px; background:#222; border:none; color:white; border-radius:4px; }
.form-group { margin-bottom:15px; }
</style>
</head>
<body>

<h1>Admin Dashboard</h1>

<div class="dashboard-grid">
    <div class="sidebar">
        <button onclick="showSection('overview')">Overview</button>
        <button onclick="showSection('products')">Manage Products</button>
        <button onclick="showSection('add-product')">Add Product</button>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="main-content">
        <div id="overview-section">
            <h2>Inventory Overview</h2>
            <div class="stats" id="dashboard-stats">
                <!-- Stats will load here -->
            </div>
        </div>

        <div id="products-section" style="display:none;">
            <h2>Manage Products</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-product-list">
                    <!-- Products will load here -->
                </tbody>
            </table>
        </div>

        <div id="add-product-section" style="display:none;">
            <h2>Add New Product</h2>
            <div class="form-group">
                <input type="text" id="p-name" placeholder="Product Name">
            </div>
            <div class="form-group">
                <select id="p-cat">
                    <option value="Necklaces">Necklaces</option>
                    <option value="Earrings">Earrings</option>
                    <option value="Bracelets">Bracelets</option>
                    <option value="Rings">Rings</option>
                </select>
            </div>
            <div class="form-group">
                <input type="number" id="p-price" placeholder="Price (₦)">
            </div>
            <div class="form-group">
                <input type="number" id="p-stock" placeholder="Stock Quantity">
            </div>
            <div class="form-group">
                <textarea id="p-desc" placeholder="Description"></textarea>
            </div>
            <button class="btn" onclick="addNewProduct()">Save Product</button>
        </div>
    </div>
</div>

<script>
    // Check Auth
    if(localStorage.getItem("adminLoggedIn") !== "true") {
        window.location.href = "admin.html";
    }

    let products = JSON.parse(localStorage.getItem("products")) || [];

    function logout() {
        localStorage.removeItem("adminLoggedIn");
        window.location.href = "admin.html";
    }

    function showSection(id) {
        document.getElementById("overview-section").style.display = "none";
        document.getElementById("products-section").style.display = "none";
        document.getElementById("add-product-section").style.display = "none";
        document.getElementById(id + "-section").style.display = "block";
    }

    function renderDashboard() {
        // Stats
        let totalStock = products.reduce((sum, p) => sum + parseInt(p.stock), 0);
        let lowStock = products.filter(p => p.stock <= 3).length;
        
        document.getElementById("dashboard-stats").innerHTML = `
            <div class="stat-card">
                <h3>Total Products</h3>
                <p>${products.length}</p>
            </div>
            <div class="stat-card">
                <h3>Total Inventory</h3>
                <p>${totalStock}</p>
            </div>
            <div class="stat-card">
                <h3>Low Stock Alerts</h3>
                <p style="color:#ff4b4b;">${lowStock}</p>
            </div>
        `;

        // Product List
        let tbody = document.getElementById("admin-product-list");
        tbody.innerHTML = "";
        products.forEach(p => {
            tbody.innerHTML += `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>${p.category}</td>
                    <td>₦${parseInt(p.price).toLocaleString()}</td>
                    <td>${p.stock}</td>
                    <td>
                        <button class="btn btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    function addNewProduct() {
        let name = document.getElementById("p-name").value;
        let cat = document.getElementById("p-cat").value;
        let price = document.getElementById("p-price").value;
        let stock = document.getElementById("p-stock").value;
        let desc = document.getElementById("p-desc").value;

        if(!name || !price || !stock) {
            alert("Please fill required fields");
            return;
        }

        let newProduct = {
            id: Date.now(),
            name: name,
            category: cat,
            price: parseInt(price),
            stock: parseInt(stock),
            description: desc,
            image: "assets/hero.jpg" // mock image
        };

        products.push(newProduct);
        localStorage.setItem("products", JSON.stringify(products));
        alert("Product added!");
        renderDashboard();
        showSection("products");
    }

    function deleteProduct(id) {
        if(confirm("Are you sure?")) {
            products = products.filter(p => p.id !== id);
            localStorage.setItem("products", JSON.stringify(products));
            renderDashboard();
        }
    }

    document.addEventListener("DOMContentLoaded", renderDashboard);

</script>
</body>
</html>
